<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>SkyPilot 3D</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Portrait lock -->
  <div id="rotate-msg">
    <div class="rm-icon">📱</div>
    <div class="rm-txt">Rotate to Landscape</div>
  </div>

  <!-- Three.js renders here -->
  <canvas id="three-cvs"></canvas>

  <!-- 2D HUD overlay -->
  <canvas id="hud-cvs"></canvas>

  <!-- Mobile on-screen controls (shown by JS on touch device) -->
  <div id="mob">
    <div id="joy-zone"><div id="joy-knob"></div></div>

    <div id="center-btns">
      <div class="btn-row">
        <button class="mbtn" id="btn-yl">◀</button>
        <button class="mbtn" id="btn-yr">▶</button>
      </div>
      <div class="btn-row">
        <button class="mbtn sm" id="btn-flap">FLAP</button>
        <button class="mbtn sm" id="btn-gear">GEAR</button>
      </div>
    </div>

    <div id="thr-col">
      <span class="thr-lbl">THR</span>
      <div id="thr-track">
        <div id="thr-fill"></div>
        <div id="thr-thumb"></div>
      </div>
    </div>
  </div>

  <!-- Crash overlay -->
  <div id="crash">
    <h1>CRASHED</h1>
    <p>Impact too hard — try again, pilot</p>
    <button onclick="resetFlight()">↺ RESTART</button>
  </div>

  <!-- Start screen -->
  <div id="start">
    <h1>SKYPILOT</h1>
    <div class="ctrl-grid">
      <span>W / S</span><span>Pitch</span>
      <span>A / D</span><span>Roll</span>
      <span>Q / E</span><span>Yaw</span>
      <span>↑ / ↓</span><span>Throttle</span>
      <span>F</span><span>Flaps</span>
      <span>G</span><span>Gear</span>
    </div>
    <button onclick="startFlight()">▶ TAKE OFF</button>
  </div>

  <!-- Desktop key hints -->
  <div id="key-hints">
    <span>W/S</span> Pitch &nbsp;<span>A/D</span> Roll &nbsp;<span>Q/E</span> Yaw<br>
    <span>↑/↓</span> Throttle &nbsp;<span>F</span> Flaps &nbsp;<span>G</span> Gear &nbsp;<span>R</span> Reset
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
